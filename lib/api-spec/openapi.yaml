openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cohort — AI agent fleet governance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fleet
    description: Fleet-level overview and alerts
  - name: agents
    description: Agent registry, identity, evaluation and verdicts
  - name: connectors
    description: Platform connectors (plug and play)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /fleet/summary:
    get:
      operationId: getFleetSummary
      tags: [fleet]
      summary: Fleet summary
      description: Consolidated cohort overview for the home dashboard
      responses:
        "200":
          description: Fleet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetSummary"

  /fleet/kpis:
    get:
      operationId: getFleetKpis
      tags: [fleet]
      summary: Fleet KPI analytics
      description: Aggregated 5-layer KPI analytics, trends, ROI and rankings across the whole fleet
      responses:
        "200":
          description: Fleet KPI analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetKpis"

  /fleet/decisions:
    get:
      operationId: listFleetDecisions
      tags: [fleet]
      summary: Fleet-wide verdict decisions
      description: Pending and decided committee verdicts across the whole fleet, for the command home and audit trail.
      responses:
        "200":
          description: Fleet decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetDecision"

  /fleet/governance:
    get:
      operationId: getFleetGovernance
      tags: [fleet]
      summary: Fleet governance overview
      description: Compliance summary, responsibility chain grouped by business owner and audit trail.
      responses:
        "200":
          description: Fleet governance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetGovernance"

  /fleet/benchmarks:
    get:
      operationId: getFleetBenchmarks
      tags: [fleet]
      summary: Fleet benchmarks
      description: ROI and accuracy rankings across the whole fleet.
      responses:
        "200":
          description: Fleet benchmarks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetBenchmarks"

  /fleet/alerts:
    get:
      operationId: listFleetAlerts
      tags: [fleet]
      summary: Active fleet alerts
      description: Illusory-victory detector alerts across the whole fleet
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [critical, high, medium, antecedent]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, acknowledged, resolved]
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [observation, active, flagged, retiring, retired]
        - name: verdict
          in: query
          required: false
          schema:
            type: string
            enum: [promote, mentor, retire, observation]
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [critical, high, medium, stable]
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Admit a new agent (Carteira de Trabalho)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Agent admitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"

  /discovery/analyze:
    post:
      operationId: analyzeAgentSource
      tags: [agents]
      summary: Analyze pasted agent code and skills into an editable draft
      description: >-
        Uses an AI model to read the agent's code and skill definitions and
        propose a persona, Carteira de Trabalho and 5-layer KPI metrics. The
        result is an editable draft and is not persisted until admission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSourceInput"
      responses:
        "200":
          description: Draft generated from the provided source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraft"

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get a single agent with full work record
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent core fields
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Retire and remove an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /agents/{agentId}/identity:
    patch:
      operationId: updateAgentIdentity
      tags: [agents]
      summary: Update the agent work record (identity)
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityUpdate"
      responses:
        "200":
          description: Updated agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"

  /agents/{agentId}/evaluations:
    get:
      operationId: listAgentEvaluations
      tags: [agents]
      summary: Evaluation history for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluation"

  /agents/{agentId}/metrics/{window}:
    get:
      operationId: getAgentMetrics
      tags: [agents]
      summary: KPI time series for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: window
          in: path
          required: true
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d"]
      responses:
        "200":
          description: KPI time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricPoint"

  /agents/{agentId}/verdicts:
    get:
      operationId: listAgentVerdicts
      tags: [agents]
      summary: Immutable verdict history for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verdict history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Verdict"

  /agents/{agentId}/verdict/decision:
    post:
      operationId: decideVerdict
      tags: [agents]
      summary: Approve, disagree with, or export the current verdict
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerdictDecisionInput"
      responses:
        "200":
          description: Updated verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verdict"

  /connectors:
    get:
      operationId: listConnectors
      tags: [connectors]
      summary: List platform connectors
      responses:
        "200":
          description: Connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connector"
    post:
      operationId: connectPlatform
      tags: [connectors]
      summary: Connect a platform (plug and play)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorInput"
      responses:
        "201":
          description: Connector created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /connectors/{connectorId}/discover:
    post:
      operationId: discoverAgents
      tags: [connectors]
      summary: Run discovery on a connector
      description: >-
        Scans the connected platform, discovers running agents and proposes a
        5-layer KPI mapping for each so they can be admitted in one click.
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResult"

  /connectors/{connectorId}/import:
    post:
      operationId: importDiscoveredAgents
      tags: [connectors]
      summary: Admit discovered agents with their proposed metrics
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryImportInput"
      responses:
        "201":
          description: Admitted agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PlatformCount:
      type: object
      required: [platform, count]
      properties:
        platform:
          type: string
        count:
          type: integer

    VerdictBreakdown:
      type: object
      required: [promote, mentor, retire, observation]
      properties:
        promote:
          type: integer
        mentor:
          type: integer
        retire:
          type: integer
        observation:
          type: integer

    SeverityBreakdown:
      type: object
      required: [critical, high, medium, stable]
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        stable:
          type: integer

    StatusBreakdown:
      type: object
      required: [observation, active, flagged, retiring, retired]
      properties:
        observation:
          type: integer
        active:
          type: integer
        flagged:
          type: integer
        retiring:
          type: integer
        retired:
          type: integer

    FleetSummary:
      type: object
      required:
        - totalAgents
        - byVerdict
        - bySeverity
        - byStatus
        - byPlatform
        - avgHealthScore
        - activeAlerts
        - pendingDecisions
        - estimatedMonthlyValue
        - estimatedMonthlyCost
        - connectedPlatforms
      properties:
        totalAgents:
          type: integer
        byVerdict:
          $ref: "#/components/schemas/VerdictBreakdown"
        bySeverity:
          $ref: "#/components/schemas/SeverityBreakdown"
        byStatus:
          $ref: "#/components/schemas/StatusBreakdown"
        pendingDecisions:
          type: integer
        byPlatform:
          type: array
          items:
            $ref: "#/components/schemas/PlatformCount"
        avgHealthScore:
          type: number
        activeAlerts:
          type: integer
        estimatedMonthlyValue:
          type: number
        estimatedMonthlyCost:
          type: number
        connectedPlatforms:
          type: integer

    FleetKpis:
      type: object
      required:
        - layers
        - trend
        - roi
        - topPerformers
        - atRisk
        - totalEvaluations
      properties:
        layers:
          type: array
          items:
            $ref: "#/components/schemas/FleetLayerScore"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/FleetTrendPoint"
        roi:
          $ref: "#/components/schemas/FleetRoi"
        topPerformers:
          type: array
          items:
            $ref: "#/components/schemas/AgentRef"
        atRisk:
          type: array
          items:
            $ref: "#/components/schemas/AgentRef"
        totalEvaluations:
          type: integer

    FleetLayerScore:
      type: object
      required:
        - key
        - label
        - score
        - severity
        - trend
        - agentsAtRisk
      properties:
        key:
          type: string
          enum: [efficacy, efficiency, adoption, governance, value]
        label:
          type: string
        score:
          type: number
        severity:
          type: string
          enum: [critical, high, medium, stable]
        trend:
          type: number
        agentsAtRisk:
          type: integer

    FleetTrendPoint:
      type: object
      required:
        - period
        - efficacy
        - efficiency
        - adoption
        - governance
        - value
        - health
      properties:
        period:
          type: string
        efficacy:
          type: number
        efficiency:
          type: number
        adoption:
          type: number
        governance:
          type: number
        value:
          type: number
        health:
          type: number

    FleetRoi:
      type: object
      required:
        - monthlyValue
        - monthlyCost
        - netValue
        - roiPercent
        - profitableAgents
      properties:
        monthlyValue:
          type: number
        monthlyCost:
          type: number
        netValue:
          type: number
        roiPercent:
          type: number
        profitableAgents:
          type: integer

    AgentRef:
      type: object
      required:
        - id
        - name
        - platform
        - role
        - healthScore
        - currentVerdict
        - severity
      properties:
        id:
          type: string
        name:
          type: string
        platform:
          type: string
        role:
          type: string
        healthScore:
          type: number
        currentVerdict:
          type: string
          enum: [promote, mentor, retire, observation]
        severity:
          type: string
          enum: [critical, high, medium, stable]

    Agent:
      type: object
      required:
        - id
        - name
        - slug
        - role
        - platform
        - version
        - status
        - bio
        - currentVerdict
        - verdictConfidence
        - severity
        - healthScore
        - admittedAt
        - lastEvaluatedAt
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        role:
          type: string
        platform:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [observation, active, flagged, retiring, retired]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: string
        tagline:
          type: string
        monthlyVolume:
          type: integer
        headlineKpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"
        currentVerdict:
          type: string
          enum: [promote, mentor, retire, observation]
        verdictConfidence:
          type: number
        severity:
          type: string
          enum: [critical, high, medium, stable]
        healthScore:
          type: number
        activeAlerts:
          type: integer
        monthlyValue:
          type: number
        monthlyCost:
          type: number
        admittedAt:
          type: string
        lastEvaluatedAt:
          type: string

    AgentDetail:
      type: object
      required:
        - agent
        - identity
        - owners
        - latestEvaluation
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        identity:
          $ref: "#/components/schemas/AgentIdentity"
        owners:
          $ref: "#/components/schemas/AgentOwners"
        latestEvaluation:
          $ref: "#/components/schemas/Evaluation"
        currentVerdict:
          $ref: "#/components/schemas/Verdict"

    AgentIdentity:
      type: object
      required:
        - bio
        - shouldDo
        - shouldNotDo
        - autonomyLevel
        - limits
        - businessCase
        - version
      properties:
        bio:
          type: string
        shouldDo:
          type: array
          items:
            type: string
        shouldNotDo:
          type: array
          items:
            type: string
        autonomyLevel:
          type: string
          enum: [autonomous, escalates, restricted]
        autonomyNotes:
          type: string
        limits:
          type: array
          items:
            type: string
        businessCase:
          $ref: "#/components/schemas/BusinessCase"
        version:
          type: integer

    BusinessCase:
      type: object
      required:
        - baseline
        - targetPayback
        - actualPayback
        - description
      properties:
        baseline:
          type: string
        targetPayback:
          type: string
        actualPayback:
          type: string
        description:
          type: string

    AgentOwners:
      type: object
      required:
        - businessOwner
        - technicalOwner
        - governanceSponsor
      properties:
        businessOwner:
          type: string
        technicalOwner:
          type: string
        governanceSponsor:
          type: string

    KpiMetric:
      type: object
      required:
        - label
        - value
        - unit
        - trend
      properties:
        label:
          type: string
        value:
          type: number
        unit:
          type: string
        trend:
          type: number
        direction:
          type: string
          enum: [up, down, flat]

    KpiLayer:
      type: object
      required:
        - key
        - label
        - score
        - severity
        - metrics
      properties:
        key:
          type: string
          enum: [efficacy, efficiency, adoption, governance, value]
        label:
          type: string
        score:
          type: number
        severity:
          type: string
          enum: [critical, high, medium, stable]
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"

    Evaluation:
      type: object
      required:
        - id
        - agentId
        - evaluatedAt
        - window
        - layers
        - verdict
        - verdictConfidence
        - rationale
      properties:
        id:
          type: string
        agentId:
          type: string
        evaluatedAt:
          type: string
        window:
          type: string
        layers:
          type: array
          items:
            $ref: "#/components/schemas/KpiLayer"
        verdict:
          type: string
          enum: [promote, mentor, retire, observation]
        verdictConfidence:
          type: number
        rationale:
          type: string

    MetricPoint:
      type: object
      required:
        - timestamp
        - efficacy
        - efficiency
        - adoption
        - governance
        - value
      properties:
        timestamp:
          type: string
        efficacy:
          type: number
        efficiency:
          type: number
        adoption:
          type: number
        governance:
          type: number
        value:
          type: number

    NextAction:
      type: object
      required:
        - action
        - owner
        - due
      properties:
        action:
          type: string
        owner:
          type: string
        due:
          type: string

    Verdict:
      type: object
      required:
        - id
        - agentId
        - verdict
        - confidence
        - executionWindow
        - suggestedSponsor
        - nextActions
        - rationale
        - decision
        - createdAt
      properties:
        id:
          type: string
        agentId:
          type: string
        verdict:
          type: string
          enum: [promote, mentor, retire, observation]
        confidence:
          type: number
        executionWindow:
          type: string
        suggestedSponsor:
          type: string
        nextActions:
          type: array
          items:
            $ref: "#/components/schemas/NextAction"
        rationale:
          type: string
        decision:
          type: string
          enum: [pending, approved, disagreed, exported]
        decidedBy:
          type: ["string", "null"]
        decidedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    Alert:
      type: object
      required:
        - id
        - agentId
        - agentName
        - pattern
        - patternType
        - severity
        - hypothesis
        - recommendation
        - detectedAt
        - status
      properties:
        id:
          type: string
        agentId:
          type: string
        agentName:
          type: string
        pattern:
          type: string
        patternType:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, antecedent]
        hypothesis:
          type: string
        recommendation:
          type: string
        detectedAt:
          type: string
        status:
          type: string
          enum: [active, acknowledged, resolved]

    Connector:
      type: object
      required:
        - id
        - platform
        - name
        - status
        - agentsDiscovered
        - category
      properties:
        id:
          type: string
        platform:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [connected, available, syncing]
        agentsDiscovered:
          type: integer
        category:
          type: string
        lastSyncAt:
          type: ["string", "null"]

    AgentInput:
      type: object
      required:
        - name
        - role
        - platform
        - bio
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        platform:
          type: string
        version:
          type: string
        bio:
          type: string
        tagline:
          type: string
        shouldDo:
          type: array
          items:
            type: string
        shouldNotDo:
          type: array
          items:
            type: string
        autonomyLevel:
          type: string
          enum: [autonomous, escalates, restricted]
        autonomyNotes:
          type: string
        limits:
          type: array
          items:
            type: string
        businessOwner:
          type: string
        technicalOwner:
          type: string
        governanceSponsor:
          type: string
        baseline:
          type: string
        targetPayback:
          type: string
        businessCaseDescription:
          type: string
        proposedMetrics:
          type: array
          items:
            $ref: "#/components/schemas/DraftMetric"

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [observation, active, flagged, retiring, retired]
        bio:
          type: string

    IdentityUpdate:
      type: object
      properties:
        bio:
          type: string
        shouldDo:
          type: array
          items:
            type: string
        shouldNotDo:
          type: array
          items:
            type: string
        autonomyLevel:
          type: string
          enum: [autonomous, escalates, restricted]
        autonomyNotes:
          type: string
        limits:
          type: array
          items:
            type: string
        businessOwner:
          type: string
        technicalOwner:
          type: string
        governanceSponsor:
          type: string

    VerdictDecisionInput:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [approved, disagreed, exported]
        reason:
          type: string
        decidedBy:
          type: string

    DraftMetric:
      type: object
      required:
        - layer
        - label
        - unit
        - target
      properties:
        layer:
          type: string
          enum: [efficacy, efficiency, adoption, governance, value]
        label:
          type: string
        unit:
          type: string
        target:
          type: string
        rationale:
