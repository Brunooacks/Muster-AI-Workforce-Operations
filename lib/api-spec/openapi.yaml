openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cohort — AI agent fleet governance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fleet
    description: Fleet-level overview and alerts
  - name: agents
    description: Agent registry, identity, evaluation and verdicts
  - name: connectors
    description: Platform connectors (plug and play)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /fleet/summary:
    get:
      operationId: getFleetSummary
      tags: [fleet]
      summary: Fleet summary
      description: Consolidated cohort overview for the home dashboard
      responses:
        "200":
          description: Fleet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetSummary"

  /fleet/kpis:
    get:
      operationId: getFleetKpis
      tags: [fleet]
      summary: Fleet KPI analytics
      description: Aggregated 5-layer KPI analytics, trends, ROI and rankings across the whole fleet
      responses:
        "200":
          description: Fleet KPI analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetKpis"

  /fleet/decisions:
    get:
      operationId: listFleetDecisions
      tags: [fleet]
      summary: Fleet-wide verdict decisions
      description: Pending and decided committee verdicts across the whole fleet, for the command home and audit trail.
      responses:
        "200":
          description: Fleet decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetDecision"

  /fleet/governance:
    get:
      operationId: getFleetGovernance
      tags: [fleet]
      summary: Fleet governance overview
      description: Compliance summary, responsibility chain grouped by business owner and audit trail.
      responses:
        "200":
          description: Fleet governance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetGovernance"

  /fleet/benchmarks:
    get:
      operationId: getFleetBenchmarks
      tags: [fleet]
      summary: Fleet benchmarks
      description: ROI and accuracy rankings across the whole fleet.
      responses:
        "200":
          description: Fleet benchmarks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetBenchmarks"

  /fleet/alerts:
    get:
      operationId: listFleetAlerts
      tags: [fleet]
      summary: Active fleet alerts
      description: Illusory-victory detector alerts across the whole fleet
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [critical, high, medium, antecedent]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, acknowledged, resolved]
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [observation, active, flagged, retiring, retired]
        - name: verdict
          in: query
          required: false
          schema:
            type: string
            enum: [promote, mentor, retire, observation]
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [critical, high, medium, stable]
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Admit a new agent (Carteira de Trabalho)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Agent admitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"

  /discovery/analyze:
    post:
      operationId: analyzeAgentSource
      tags: [agents]
      summary: Analyze pasted agent code and skills into an editable draft
      description: >-
        Uses an AI model to read the agent's code and skill definitions and
        propose a persona, Carteira de Trabalho and 5-layer KPI metrics. The
        result is an editable draft and is not persisted until admission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSourceInput"
      responses:
        "200":
          description: Draft generated from the provided source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraft"

  /discovery/fetch:
    post:
      operationId: fetchAgentSource
      tags: [agents]
      summary: Fetch agent source from a Git repository or web URL
      description: >-
        Fetches and concatenates the relevant source and skill files from a
        Git repository (e.g. GitHub) or a single web/raw URL, applying size and
        file-type guardrails. Private GitHub repositories are supported when a
        GitHub credential is available via the Replit GitHub connector (or a
        GITHUB_TOKEN secret); otherwise only public repos are accessible. The
        concatenated text can then be passed to the analyze endpoint. Nothing is
        persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchSourceInput"
      responses:
        "200":
          description: Source fetched and concatenated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchSourceResult"

  /discovery/github-status:
    get:
      operationId: getGitHubStatus
      tags: [agents]
      summary: Report whether a GitHub credential is available for private imports
      description: >-
        Read-only check that reports whether a GitHub credential is currently
        resolvable (via the Replit GitHub connector or a GITHUB_TOKEN secret),
        without ever exposing the token. Used by the import screen to show the
        connection status before attempting a private-repo import.
      responses:
        "200":
          description: GitHub connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubStatus"

  /discovery/runs:
    post:
      operationId: startDiscoveryRun
      tags: [agents]
      summary: Start a mass-discovery run
      description: >-
        Opens a discovery run that groups the agents found from a source
        (connector platform, GitHub org, etc.) and stages them as editable
        drafts before any admission. The rich rule-based / AI enrichment is
        performed by separate workers; this endpoint persists the run and the
        bare staged drafts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDiscoveryRunInput"
      responses:
        "201":
          description: Discovery run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRun"

  /discovery/runs/{runId}:
    get:
      operationId: getDiscoveryRun
      tags: [agents]
      summary: Get a discovery run with progress counts
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discovery run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRun"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /discovery/drafts:
    get:
      operationId: listAgentDrafts
      tags: [agents]
      summary: List staged agent drafts with filters
      parameters:
        - name: runId
          in: query
          required: false
          schema:
            type: string
        - name: reviewStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: enrichmentStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, rules, enriching, enriched, failed]
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: minConfidence
          in: query
          required: false
          schema:
            type: number
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Staged drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentDraftRecord"

  /discovery/drafts/bulk-approve:
    post:
      operationId: bulkApproveAgentDrafts
      tags: [agents]
      summary: Approve multiple drafts (promote to fleet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDraftIdsInput"
      responses:
        "200":
          description: Bulk approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReviewResult"

  /discovery/drafts/bulk-reject:
    post:
      operationId: bulkRejectAgentDrafts
      tags: [agents]
      summary: Reject multiple drafts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDraftIdsInput"
      responses:
        "200":
          description: Bulk rejection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReviewResult"

  /discovery/drafts/{draftId}:
    patch:
      operationId: updateAgentDraft
      tags: [agents]
      summary: Edit a staged draft before review
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentDraftUpdate"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /discovery/drafts/{draftId}/approve:
    post:
      operationId: approveAgentDraft
      tags: [agents]
      summary: Approve a draft and promote it to the fleet
      description: >-
        Promotes the draft into the real fleet reusing the standard agent
        admission path (Carteira de Trabalho + seeded initial evaluation), then
        marks the draft as approved and links it to the created agent.
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Agent admitted from draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Draft already reviewed or agent already admitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /discovery/drafts/{draftId}/reject:
    post:
      operationId: rejectAgentDraft
      tags: [agents]
      summary: Reject a draft without touching the fleet
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDraftInput"
      responses:
        "200":
          description: Rejected draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get a single agent with full work record
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent core fields
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Retire and remove an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /agents/{agentId}/identity:
    patch:
      operationId: updateAgentIdentity
      tags: [agents]
      summary: Update the agent work record (identity)
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityUpdate"
      responses:
        "200":
          description: Updated agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"

  /agents/{agentId}/evaluations:
    get:
      operationId: listAgentEvaluations
      tags: [agents]
      summary: Evaluation history for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluation"

  /agents/{agentId}/metrics/{window}:
    get:
      operationId: getAgentMetrics
      tags: [agents]
      summary: KPI time series for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: window
          in: path
          required: true
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d"]
      responses:
        "200":
          description: KPI time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricPoint"

  /agents/{agentId}/verdicts:
    get:
      operationId: listAgentVerdicts
      tags: [agents]
      summary: Immutable verdict history for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verdict history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Verdict"

  /agents/{agentId}/verdict/decision:
    post:
      operationId: decideVerdict
      tags: [agents]
      summary: Approve, disagree with, or export the current verdict
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerdictDecisionInput"
      responses:
        "200":
          description: Updated verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Verdict"

  /agents/{agentId}/evaluation/metric:
    patch:
      operationId: updateEvaluationMetric
      tags: [agents]
      summary: Edit a KPI metric's goal (target + rationale) on the latest evaluation
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationMetricUpdate"
      responses:
        "200":
          description: Updated agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"

  /connectors:
    get:
      operationId: listConnectors
      tags: [connectors]
      summary: List platform connectors
      responses:
        "200":
          description: Connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connector"
    post:
      operationId: connectPlatform
      tags: [connectors]
      summary: Connect a platform (plug and play)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorInput"
      responses:
        "201":
          description: Connector created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /connectors/{connectorId}/discover:
    post:
      operationId: discoverAgents
      tags: [connectors]
      summary: Run discovery on a connector
      description: >-
        Scans the connected platform, discovers running agents and proposes a
        5-layer KPI mapping for each so they can be admitted in one click.
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResult"

  /connectors/{connectorId}/import:
    post:
      operationId: importDiscoveredAgents
      tags: [connectors]
      summary: Admit discovered agents with their proposed metrics
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryImportInput"
      responses:
        "201":
          description: Admitted agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /catalog/metrics:
    get:
      operationId: listCatalogMetrics
      tags: [catalog]
      summary: List the metric catalog grouped by business vertical
      responses:
        "200":
          description: Metric catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogVertical"
    post:
      operationId: createCatalogMetric
      tags: [catalog]
      summary: Create a tailor-made custom metric
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogMetricInput"
      responses:
        "201":
          description: Metric created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogMetric"

  /catalog/metrics/{metricKey}:
    patch:
      operationId: updateCatalogMetric
      tags: [catalog]
      summary: Update a catalog metric
      parameters:
        - name: metricKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogMetricUpdate"
      responses:
        "200":
          description: Updated metric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogMetric"
    delete:
      operationId: deleteCatalogMetric
      tags: [catalog]
      summary: Delete a custom metric (seeded metrics cannot be deleted)
      parameters:
        - name: metricKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /connectors/register:
    post:
      operationId: registerConnector
      tags: [connectors]
      summary: Register a real connector with a credential and test it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterConnectorInput"
      responses:
        "201":
          description: Connector registered (test result included)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterConnectorResult"

  /connectors/{connectorId}/test:
    post:
      operationId: testConnector
      tags: [connectors]
      summary: Test a registered connector's credential against the live platform
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorTestResult"

  /discovery/pre-assess:
    post:
      operationId: preAssessAgentSource
      tags: [agents]
      summary: Heuristic pre-assessment of an agent repository (no AI key needed)
      description: >-
        Fetches the repository, understands the agent via static heuristics
        (stack detection, README dossier parsing, KPI-table extraction) and
        returns a pre-filled Carteira de Trabalho draft with per-field
        confidence, framing missing metrics from the metric catalog. Works
        without any AI credential; when one is configured the AI analyzer can
        refine this draft afterwards.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreAssessInput"
      responses:
        "200":
          description: Pre-assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreAssessResult"

  /agents/{agentId}/events:
    post:
      operationId: ingestAgentEvent
      tags: [agents]
      summary: Ingest a telemetry event (execution, error, escalation) for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentEventInput"
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                required: [accepted]
                properties:
                  accepted:
                    type: boolean

  /agents/{agentId}/telemetry/{window}:
    get:
      operationId: getAgentTelemetry
      tags: [agents]
      summary: Aggregated telemetry summary for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: window
          in: path
          required: true
          schema:
            type: string
            enum: ["7d", "30d", "90d"]
      responses:
        "200":
          description: Telemetry summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySummary"

  /agents/{agentId}/reevaluate:
    post:
      operationId: reevaluateAgent
      tags: [agents]
      summary: Recompute the agent evaluation — from real telemetry when available
      responses:
        "200":
          description: Reevaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReevaluateOutcome"
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PlatformCount:
      type: object
      required: [platform, count]
      properties:
        platform:
          type: string
        count:
          type: integer

    VerdictBreakdown:
      type: object
      required: [promote, mentor, retire, observation]
      properties:
        promote:
          type: integer
        mentor:
          type: integer
        retire:
          type: integer
        observation:
          type: integer

    SeverityBreakdown:
      type: object
      required: [critical, high, medium, stable]
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        stable:
          type: integer

    StatusBreakdown:
      type: object
      required: [observation, active, flagged, retiring, retired]
      properties:
        observation:
          type: integer
        active:
          type: integer
        flagged:
          type: integer
        retiring:
          type: integer
        retired:
          type: integer

    FleetSummary:
      type: object
      required:
        - totalAgents
        - byVerdict
        - bySeverity
        - byStatus
        - byPlatform
        - avgHealthScore
        - activeAlerts
        - pendingDecisions
        - estimatedMonthlyValue
        - estimatedMonthlyCost
        - connectedPlatforms
      properties:
        totalAgents:
          type: integer
        byVerdict:
          $ref: "#/components/schemas/VerdictBreakdown"
        bySeverity:
