kind = "web"
previewPath = "/"
title = "Cohort"
version = "1.0.0"
id = "artifacts/cohort"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19087

[services.development]
run = "pnpm --filter @workspace/cohort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cohort", "run", "build" ]
publicDir = "artifacts/cohort/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19087"
BASE_PATH = "/"
